<?xml version="1.0" encoding="UTF-8"?>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" width="320" height="96">
  <defs>
    <style>
      .door-frame { fill: none; stroke: #0A1432; stroke-width: 2.2; }
      .door-panel { fill: none; stroke: #0A1432; stroke-width: 1; opacity: 0.35; }
      .handle { fill: #C6A24B; }
      .accent { fill: #C6A24B; }
      .divider { stroke: #0A1432; stroke-width: 1; opacity: 0.18; }
      .wordmark-primary {
        font-family: 'Jura', 'Helvetica Neue', sans-serif;
        font-weight: 300;
        font-size: 22px;
        letter-spacing: 1.6px;
        fill: #0A1432;
        text-transform: uppercase;
      }
      .wordmark-secondary {
        font-family: 'Jura', 'Helvetica Neue', sans-serif;
        font-weight: 300;
        font-size: 18px;
        letter-spacing: 0.9px;
        fill: #C6A24B;
      }
    </style>
  </defs>

  <!-- Door icon (golden-ratio proportions) -->

  <g transform="translate(12, 12)">
    <!-- Door frame -->
    <rect class="door-frame" x="0" y="0" width="44" height="71" rx="0.5"/>
    <!-- Inner panel outline -->
    <rect class="door-panel" x="5" y="5" width="34" height="61"/>
    <!-- Handle -->
    <rect class="handle" x="32" y="42" width="8" height="2"/>
    <!-- Gold accent line beneath door (threshold) -->
    <line x1="-4" y1="76" x2="48" y2="76" stroke="#AF8C38" stroke-width="1.5" opacity="0.55"/>
  </g>

  <!-- Vertical divider -->

  <line class="divider" x1="78" y1="24" x2="78" y2="72"/>

  <!-- Wordmark -->

<text class="wordmark-primary" x="92" y="42">All Things</text>
<text class="wordmark-secondary" x="92" y="68">Fire Doors</text>
</svg>